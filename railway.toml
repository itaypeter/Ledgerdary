[build]
builder = "nixpacks"

[[services]]
name = "backend"
source = "backend"

[services.build]
buildCommand = "npm install"

[services.deploy]
startCommand = "node server.js"
healthcheckPath = "/health"

[[services]]
name = "frontend"
source = "frontend"

[services.build]
buildCommand = "npm install && npm run build"

[services.deploy]
startCommand = "npx serve dist -p $PORT"
